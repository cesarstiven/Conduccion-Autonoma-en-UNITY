behaviors:
  MyCarPPO:                       # <--- Revisa que coincida con tu nombre en Unity
    trainer_type: ppo
    hyperparameters:
      batch_size: 256
      buffer_size: 2048
      learning_rate: 0.0003
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 2000000            # <--- Actualizado a 2 Millones
    time_horizon: 64
    summary_freq: 10000
    checkpoint_interval: 200000
    keep_checkpoints: 5

engine_settings:
  time_scale: 20
  quality_level: 2